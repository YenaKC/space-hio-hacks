<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style></style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- OPENING SCENE -->
     <div id="opening-screen">
        <img id="opening-image" src="./assets/images/cut1-earth.png" alt="Ruined Earth">

        <div id="opening-text">
            <p id="first-verb">year 2026.</p>
            <p>earth is no longer habitable.</p>
            <p>the last survivors of humanity wander through deep space, searching for a new home.</p>
        </div>

        <button id="next-opening-btn">next</button>

     </div>

    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <h1>space hio hacks</h1>
        <p class="intro-desc">year 2626...</p>
        <button id="start-btn">start</button>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="game-board">

        <div id="stat-hud">
            <span>score: <span id="score">0</span></span>
            <span>life: <span id="life">15</span></span>
        </div>

        <div id="player"></div>

    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen">
        <h1>game over</h1>
        <button id="restart-btn">restart</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
