<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style></style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- OPENING SCENE -->
    <div id="opening-screen">

        <!-- CUT# SCENES -->
        <img id="opening-image" src="./assets/images/cut1-earth.png" alt="Ruined Earth">

        <div id="opening-text"></div>

        <button id="skip-opening-btn">skip</button>

    </div>
    <div id="white-fade"></div>

    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <!-- <h1>space hio hacks</h1> -->
        <img src="./assets/images/logo-spacehio.png" alt="SPACE HIO HACKS" id="game-logo">
        <p class="intro-desc">year 2626...</p>
        <button id="start-btn">start mission</button>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="game-board">

        <div id="stat-hud">
            <span>score: <span id="score">0</span></span>
            <!-- <span>life: <span id="life">15</span></span> -->
            <div class="life-wrapper">
                <span>Life</span>
                <div class="life-bar">
                    <div id="life-fill"></div>
                </div>
            </div>

        </div>

        <div id="player"></div>

    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen">
        <h1>game over</h1>
        <button id="restart-btn">retry</button>
    </div>

    <!-- WIN SCREEN -->
    <div id="win-screen">
        <h1>mission complete</h1>
        <p>YOSEA atmosphere confirmed.</p>
        <p>Humanity has survived.</p>
        <button id="play-again-btn">play again</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
