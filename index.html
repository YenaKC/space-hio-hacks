<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space HIO Hacks</title>
</head>
<body>
    
    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <h1>space hio hacks</h1>
        <p class="intro-desc">year 2626...</p>
        <button id="start-btn">start</button>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="game-board">

        <div id="stat-hud">
            <span>score: 0</span>
            <span>life: 3</span>
        </div>

        <div id="player"></div>

    </div>

    <!-- GAME OVER SCREEN -->
     <div id="game-over-screen">
        <h1>game over</h1>
        <button id="restart-btn">restart</button>
     </div>


</body>
</html>
